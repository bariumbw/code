<!DOCTYPE html>

<html lang="zh-Hant">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Wedding Command Center | 安全加強版</title>

    <style>

        * { box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 0; }

        body { background-color: #f5f5f7; color: #1d1d1f; padding: 15px; }

        .container { width: 100%; max-width: 1000px; background: #fff; border-radius: 16px; margin: auto; padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }

        header { border-bottom: 1px solid #e5e5e7; padding-bottom: 12px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }

        h1 { font-size: 20px; }

        .nav-menu { display: flex; gap: 10px; margin-bottom: 20px; background: #f5f5f7; padding: 6px; border-radius: 12px; }

        .nav-btn { flex: 1; border: none; padding: 10px; border-radius: 8px; cursor: pointer; background: transparent; font-weight: 500; }

        .nav-btn.active { background: #fff; color: #0071e3; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        .page { display: none; }

        .page.active { display: block; }

        .form-group { margin-bottom: 15px; }

        label { display: block; margin-bottom: 5px; font-size: 14px; color: #86868b; }

        input, select { width: 100%; padding: 12px; border: 1px solid #d2d2d7; border-radius: 10px; font-size: 16px; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .primary-action { width: 100%; padding: 14px; background: #0071e3; color: #fff; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; margin-top: 10px; }

        .preview-card { background: #fdfdfd; padding: 20px; border-radius: 12px; border: 1px solid #e5e5e7; margin-top: 20px; }

        .info-row { display: flex; justify-content: space-between; margin-bottom: 10px; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }

        th, td { padding: 12px; border-bottom: 1px solid #e5e5e7; text-align: left; font-size: 14px; }

        @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } .nav-menu { flex-wrap: wrap; } }

    </style>

</head>

<body>



<div class="container">

    <header>

        <h1>Wedding Command Center</h1>

        <div id="userTag" style="font-size: 12px; color: #86868b;"></div>

    </header>



    <nav id="navBar" class="nav-menu" style="display: none;">

        <button class="nav-btn active" onclick="showPage('stockPage')">庫存查詢</button>

        <button class="nav-btn" onclick="showPage('regPage')">入庫登記</button>

        <button class="nav-btn" onclick="showPage('logPage')">紀錄清單</button>

        <button class="nav-btn" onclick="location.reload()">登出</button>

    </nav>



    <!-- 登入頁面 (加入驗證邏輯) -->

    <div id="loginPage" class="page active">

        <h2 style="margin-bottom:20px;">🔒 安全驗證</h2>

        <form onsubmit="doLogin(event)">

            <div class="form-group"><label>Email</label><input type="email" id="uMail" required placeholder="example@bespoke-mall.com"></div>

            <div class="form-group"><label>通行代碼</label><input type="password" id="uPass" required placeholder="請輸入密碼"></div>

            <button type="submit" class="primary-action">經驗證進入系統</button>

        </form>

    </div>



    <!-- 庫存頁面 -->

    <div id="stockPage" class="page">

        <div id="adminPanel" style="display:none; background:#f9f9fb; padding:15px; border-radius:12px; margin-bottom:20px; border:1px dashed #d2d2d7;">

            <h3 style="font-size:14px; margin-bottom:10px;">⚙️ 管理員設定</h3>

            <div class="grid-2">

                <div>

                    <label>新增供應商</label>

                    <input type="text" id="newSup" placeholder="名稱">

                    <button class="primary-action" onclick="addSup()" style="padding:8px;">新增</button>

                </div>

                <div>

                    <label>定義禮券規則</label>

                    <select id="selSupForGift"></select>

                    <input type="text" id="newGName" placeholder="禮券名稱" style="margin-top:5px;">

                    <select id="newGRule" style="margin-top:5px;">

                        <option value="12m_end">12個月月底</option>

                        <option value="13m_end">13個月月底</option>

                        <option value="14m_end">14個月月底</option>

                        <option value="15m_end">15個月月底</option>

                        <option value="18m_end">18個月月底</option>

                        <option value="24m_end">24個月月底</option>

                        <option value="365d">365日</option>

                    </select>

                    <button class="primary-action" onclick="addGiftRule()" style="padding:8px;">儲存規則</button>

                </div>

            </div>

        </div>



        <h2>目前存量查詢</h2>

        <div class="grid-2">

            <div class="form-group"><label>供應商</label><select id="s1" onchange="syncG('s1','g1')"></select></div>

            <div class="form-group"><label>禮券項目</label><select id="g1" onchange="refreshStock()"></select></div>

        </div>

        <div class="preview-card" style="border-left: 5px solid #34c759;">

            <div class="info-row"><span>存量:</span><strong id="vCount">-</strong></div>

            <div class="info-row"><span>有效日期:</span><strong id="vExp">-</strong></div>

        </div>

    </div>



    <!-- 登記頁面 -->

    <div id="regPage" class="page">

        <h2>入庫登記</h2>

        <form onsubmit="preView(event)">

            <div class="grid-2">

                <div class="form-group"><label>供應商</label><select id="s2" onchange="syncG('s2','g2')"></select></div>

                <div class="form-group"><label>禮券項目</label><select id="g2"></select></div>

            </div>

            <div class="grid-2">

                <div class="form-group"><label>起始號碼</label><input type="text" id="cStart" required></div>

                <div class="form-group"><label>結束號碼</label><input type="text" id="cEnd" required></div>

            </div>

            <button type="submit" class="primary-action" style="background:#1d1d1f;">預覽計算</button>

        </form>

        <div id="preBox" class="preview-card" style="display:none; border-left: 5px solid #0071e3;">

            <div class="info-row"><span>計算數量:</span><strong id="pCount">0</strong></div>

            <div class="info-row"><span>預測有效期:</span><strong id="pExp">-</strong></div>

            <button class="primary-action" onclick="finalCommit()" style="background:#34c759;">確認存檔</button>

        </div>

    </div>



    <!-- 紀錄頁面 -->

    <div id="logPage" class="page">

        <h2>歷史登記紀錄</h2>

        <div style="overflow-x:auto;">

            <table>

                <thead><tr><th>時間</th><th>項目</th><th>數量</th><th>經手人</th></tr></thead>

                <tbody id="logBody"></tbody>

            </table>

        </div>

    </div>

</div>



<script>

    const API = 'https://script.google.com/macros/s/AKfycbxfnefSEqBZBdz8JTH54XqvHSSlYinLQRxHEwBYJfROiOoG5MvxrFsQ-dXVS_SKab2a/exec';

    let dataMap = {}, history = [], curUser = '', pending = null;



    // 🔒 登入驗證修正

    function doLogin(e) {

        e.preventDefault();

        const mail = document.getElementById('uMail').value;

        const pass = document.getElementById('uPass').value;



        // ⚠️ 請修改此處的密碼 ⚠️

        const MASTER_PASSWORD = "YOUR_SECURE_PASSWORD"; 



        if (pass === MASTER_PASSWORD) {

            curUser = mail;

            document.getElementById('navBar').style.display = 'flex';

            document.getElementById('loginPage').classList.remove('active');

            document.getElementById('userTag').innerText = curUser;

            if(curUser === 'support@bespoke-mall.com') document.getElementById('adminPanel').style.display = 'block';

            loadDB();

            showPage('stockPage');

        } else {

            alert("通行代碼不正確，請重新輸入！");

            document.getElementById('uPass').value = '';

        }

    }



    function getExpDate(rule) {

        let now = new Date();

        if (rule === '365d') {

            now.setDate(now.getDate() + 365);

            return now.toISOString().split('T')[0];

        }

        let m = parseInt(rule.match(/\d+/)) || 12;

        let target = new Date(now.getFullYear(), now.getMonth() + m + 1, 0);

        return target.toISOString().split('T')[0];

    }



    function showPage(id) {

        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));

        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

        document.getElementById(id).classList.add('active');

    }



    function loadDB() {

        fetch(`${API}?action=readAll`).then(r => r.json()).then(res => {

            dataMap = res.config || {};

            history = res.records || [];

            updateSelectors();

            refreshStock();

            renderLogs();

        });

    }



    function updateSelectors() {

        const sups = Object.keys(dataMap);

        ['s1', 's2', 'selSupForGift'].forEach(id => {

            const el = document.getElementById(id);

            el.innerHTML = '';

            sups.forEach(s => el.add(new Option(s, s)));

        });

        syncG('s1','g1');

        syncG('s2','g2');

    }



    function syncG(sid, gid) {

        const s = document.getElementById(sid).value;

        const g = document.getElementById(gid);

        g.innerHTML = '';

        if(dataMap[s]) dataMap[s].forEach(i => g.add(new Option(i.name, i.name)));

    }



    function preView(e) {

        e.preventDefault();

        const s = document.getElementById('s2').value;

        const gn = document.getElementById('g2').value;

        const st = document.getElementById('cStart').value;

        const en = document.getElementById('cEnd').value;

        const rule = dataMap[s].find(x => x.name === gn).rule;

        const count = Math.abs(parseInt(en.replace(/\D/g,'')) - parseInt(st.replace(/\D/g,''))) + 1;

        const exp = getExpDate(rule);

        pending = { timestamp: new Date().toLocaleString(), supplier: s, giftName: gn, count: count, expiry: exp, user: curUser };

        document.getElementById('pCount').innerText = count;

        document.getElementById('pExp').innerText = exp;

        document.getElementById('preBox').style.display = 'block';

    }



    function finalCommit() {

        fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'insertRecord', data: pending }) });

        history.unshift(pending);

        alert('入庫成功');

        document.getElementById('preBox').style.display = 'none';

        renderLogs();

        showPage('logPage');

    }



    function renderLogs() {

        const b = document.getElementById('logBody');

        b.innerHTML = '';

        history.forEach(h => { b.innerHTML += `<tr><td>${h.timestamp}</td><td>${h.giftName}</td><td>${h.count}</td><td>${h.user}</td></tr>`; });

    }



    function refreshStock() {

        const gn = document.getElementById('g1').value;

        const rec = history.find(h => h.giftName === gn);

        document.getElementById('vCount').innerText = rec ? rec.count + ' 張' : '無庫存';

        document.getElementById('vExp').innerText = rec ? rec.expiry : '-';

    }



    function addSup() {

        const n = document.getElementById('newSup').value;

        if(n) { dataMap[n] = []; saveConfig(); }

    }



    function addGiftRule() {

        const s = document.getElementById('selSupForGift').value;

        const n = document.getElementById('newGName').value;

        const r = document.getElementById('newGRule').value;

        if(s && n) { dataMap[s].push({ name: n, rule: r }); saveConfig(); }

    }



    function saveConfig() {

        fetch(API, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'saveConfig', data: dataMap }) }).then(() => loadDB());

    }

</script>

</body>

</html>
