<!DOCTYPE html>

    <title>券碼管理與登記系統</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #f5f5f7;
            color: #333333;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            padding: 24px;
        }

        header {
            border-bottom: 1px solid #e5e5e7;
            padding-bottom: 16px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 24px;
            color: #1d1d1f;
        }

        h2 {
            font-size: 20px;
            color: #1d1d1f;
            margin-bottom: 16px;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
        }

        input[type="text"],
        input[type="email"],
        input[type="date"],
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #d2d2d7;
            border-radius: 8px;
            font-size: 16px;
            background-color: #ffffff;
            outline: none;
        }

        input:focus, select:focus {
            border-color: #0071e3;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #0071e3;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #005bb5;
        }

        button.secondary {
            background-color: #f5f5f7;
            color: #0071e3;
            border: 1px solid #0071e3;
            margin-top: 12px;
        }

        button.secondary:hover {
            background-color: #e8e8ed;
        }

        .nav-menu {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .nav-btn {
            background-color: #f5f5f7;
            color: #1d1d1f;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            border: none;
            width: auto;
        }

        .nav-btn.active {
            background-color: #1d1d1f;
            color: #ffffff;
        }

        .info-card {
            background-color: #f5f5f7;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .info-row:last-child {
            margin-bottom: 0;
        }

        .table-responsive {
            width: 100%;
            overflow-x: auto;
            margin-top: 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 14px;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #e5e5e7;
        }

        th {
            background-color: #f5f5f7;
            font-weight: 600;
        }

        .user-info {
            font-size: 14px;
            color: #666666;
            text-align: right;
        }

        @media (max-width: 600px) {
            .grid-2 {
                grid-template-columns: 1fr;
                gap: 0;
            }
            .nav-menu {
                flex-wrap: wrap;
            }
            .nav-btn {
                flex: 1 1 40%;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>券碼管理系統</h1>
            <div id="userInfo" class="user-info"></div>
        </header>

        <!-- 導覽選單 -->
        <div id="navMenu" class="nav-menu" style="display: none;">
            <button class="nav-btn active" onclick="switchPage('supplierPage')">供應商專區</button>
            <button class="nav-btn" id="adminRegTab" onclick="switchPage('registerPage')" style="display: none;">登記券 Code</button>
            <button class="nav-btn" onclick="switchPage('recordsPage')">所有登記紀錄</button>
            <button class="nav-btn secondary" onclick="logout()" style="margin-top: 0; padding: 8px 16px;">登出</button>
        </div>

        <!-- 1) 登入頁 -->
        <div id="loginPage" class="page active">
            <h2>系統登入</h2>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="loginEmail">電子郵件 (Email)</label>
                    <input type="email" id="loginEmail" required placeholder="example@domain.com">
                </div>
                <div class="form-group">
                    <label for="loginCode">識別碼</label>
                    <input type="text" id="loginCode" required placeholder="請輸入您的識別代碼">
                </div>
                <button type="submit">登入</button>
            </form>
        </div>

        <!-- 2) 供應商頁 (券選項) -->
        <div id="supplierPage" class="page">
            <h2>供應商券碼查詢</h2>
            <div class="form-group">
                <label for="supplierSelect">選擇供應商 / 券項目</label>
                <select id="supplierSelect" onchange="loadSupplierData()">
                    <option value="TA">供應商 A (TA系列)</option>
                    <option value="BD">供應商 B (BD系列)</option>
                    <option value="LV">供應商 C (LV系列)</option>
                    <option value="NM">供應商 D (NM系列)</option>
                </select>
            </div>

            <div class="info-card">
                <h3>券款詳情</h3>
                <div class="info-row" style="margin-top: 12px;">
                    <span>負責代碼項目:</span>
                    <strong id="infoPrefix">-</strong>
                </div>
                <div class="info-row">
                    <span>當前券碼範圍:</span>
                    <strong id="infoRange">-</strong>
                </div>
                <div class="info-row">
                    <span>到期日:</span>
                    <strong id="infoExpiry">-</strong>
                </div>
            </div>
        </div>

        <!-- 3) 登記code 頁 -->
        <div id="registerPage" class="page">
            <h2>登記新券碼 (管理員權限)</h2>
            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label for="regPrefix">券碼前綴 (例如: BD, TA)</label>
                    <input type="text" id="regPrefix" required placeholder="例如: BD" oninput="this.value = this.value.toUpperCase()">
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label for="regStart">首 Code (數字部分)</label>
                        <input type="text" id="regStart" required placeholder="例如: 001">
                    </div>
                    <div class="form-group">
                        <label for="regEnd">尾 Code (數字部分)</label>
                        <input type="text" id="regEnd" required placeholder="例如: 010">
                    </div>
                </div>
                <div class="form-group">
                    <label for="regExpiry">到期日時間</label>
                    <input type="date" id="regExpiry" required>
                </div>
                <button type="submit">送出登記並同步</button>
            </form>
        </div>

        <!-- 4) 記錄所有的登記code頁 -->
        <div id="recordsPage" class="page">
            <h2>所有登記歷史紀錄</h2>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>登記時間</th>
                            <th>首 Code</th>
                            <th>尾 Code</th>
                            <th>到期日</th>
                            <th>登記人</th>
                        </tr>
                    </thead>
                    <tbody id="recordsTableBody">
                        <!-- 資料由 JavaScript 動態填入 -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        // 已成功配置您的 Google Apps Script Web App 網址
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbydD_9wsRtc3Er53lttodkOOywMX3X_1051rQMp8jLLg1J9LYnQC40wRPn6entDaOMQ/exec';

        // 本地預設緩存資料（用於無網路或首次讀取時的基底）
        let localRecords = [
            { timestamp: '2026-05-16 10:00:00', startCode: 'TA001', endCode: 'TA500', expiry: '2026-12-31', user: 'agent1@test.com' }
        ];

        let currentUser = null;
        let isAdmin = false;

        // 切換頁面
        function switchPage(pageId) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(pageId).classList.add('active');
            
            const activeBtn = Array.from(document.querySelectorAll('.nav-btn')).find(btn => btn.getAttribute('onclick').includes(pageId));
            if (activeBtn) activeBtn.classList.add('active');

            if (pageId === 'recordsPage') {
                renderRecordsTable();
            }
        }

        // 登入處理
        function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const code = document.getElementById('loginCode').value.trim();

            if (!email || !code) return;

            currentUser = email;
            
            // 判斷管理員識別碼
            if (code.toUpperCase() === 'ADMIN888') {
                isAdmin = true;
                document.getElementById('adminRegTab').style.display = 'block';
            } else {
                isAdmin = false;
                document.getElementById('adminRegTab').style.display = 'none';
            }

            document.getElementById('userInfo').innerText = `使用者: ${email} ${isAdmin ? '(管理員)' : ''}`;
            document.getElementById('loginPage').classList.remove('active');
            document.getElementById('navMenu').style.display = 'flex';
            
            switchPage('supplierPage');
            
            // 登入後立即同步 Google Sheet 的多人最新共同資料
            fetchDataFromGoogleSheet();
        }

        // 登出處理
        function logout() {
            currentUser = null;
            isAdmin = false;
            document.getElementById('userInfo').innerText = '';
            document.getElementById('navMenu').style.display = 'none';
            document.getElementById('loginForm').reset();
            switchPage('loginPage');
        }

        // 載入當前選定供應商的最新資訊
        function loadSupplierData() {
            const selectedSupplier = document.getElementById('supplierSelect').value;
            document.getElementById('infoPrefix').innerText = selectedSupplier;

            const matchedRecord = [...localRecords].find(r => r.startCode.startsWith(selectedSupplier));

            if (matchedRecord) {
                document.getElementById('infoRange').innerText = `${matchedRecord.startCode} 至 ${matchedRecord.endCode}`;
                document.getElementById('infoExpiry').innerText = matchedRecord.expiry;
            } else {
                document.getElementById('infoRange').innerText = '暫無登記範圍';
                document.getElementById('infoExpiry').innerText = '暫無資料';
            }
        }

        // 管理員登記券碼
        function handleRegister(event) {
            event.preventDefault();
            
            const prefix = document.getElementById('regPrefix').value.trim().toUpperCase();
            const startNum = document.getElementById('regStart').value.trim();
            const endNum = document.getElementById('regEnd').value.trim();
            const expiry = document.getElementById('regExpiry').value;

            const startCode = prefix + startNum;
            const endCode = prefix + endNum;
            
            const now = new Date();
            const timestamp = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;

            const newRecord = {
                timestamp: timestamp,
                startCode: startCode,
                endCode: endCode,
                expiry: expiry,
                user: currentUser
            };

            // 先加到本地列表頂端以求即時反應
            localRecords.unshift(newRecord); 

            // 同步發布到 Google 試算表後台
            uploadToGoogleSheet(newRecord);

            document.getElementById('registerForm').reset();
            alert(`登記成功並已啟動背景同步！\n首 Code: ${startCode}\n尾 Code: ${endCode}`);
            
            switchPage('recordsPage');
        }

        // 渲染歷史紀錄表格
        function renderRecordsTable() {
            const tbody = document.getElementById('recordsTableBody');
            tbody.innerHTML = '';

            localRecords.forEach(record => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${record.timestamp}</td>
                    <td>${record.startCode}</td>
                    <td>${record.endCode}</td>
                    <td>${record.expiry}</td>
                    <td>${record.user}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 將數據以 POST 方式非同步送至 Google Apps Script
        function uploadToGoogleSheet(recordData) {
            fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', 
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    action: 'insert',
                    data: recordData
                })
            })
            .then(() => {
                console.log('同步封包已成功送出');
                // 延遲重整，給予 Google 後台寫入時間後重新抓取
                setTimeout(fetchDataFromGoogleSheet, 1000);
            })
            .catch(error => console.error('網路傳輸失敗:', error));
        }

        // 自 Google Sheet 抓取多人共同更新的最新完整清單
        function fetchDataFromGoogleSheet() {
            fetch(`${GOOGLE_SCRIPT_URL}?action=read`)
            .then(response => response.json())
            .then(data => {
                if (data && data.length > 0) {
                    localRecords = data; 
                    renderRecordsTable();
                    loadSupplierData();
                }
            })
            .catch(error => {
                console.error('雲端讀取失敗，採用本地既有暫存資料顯示:', error);
                renderRecordsTable();
                loadSupplierData();
            });
        }
    </script>
</body>

                            <th>到期日</th>
                            <th>登記人</th>
                        </tr>
                    </thead>
                    <tbody id="recordsTableBody">
                        <!-- 資料由 JavaScript 動態填入 -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        // 已成功配置您的 Google Apps Script Web App 網址
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbydD_9wsRtc3Er53lttodkOOywMX3X_1051rQMp8jLLg1J9LYnQC40wRPn6entDaOMQ/exec';

        // 本地預設緩存資料（用於無網路或首次讀取時的基底）
        let localRecords = [
            { timestamp: '2026-05-16 10:00:00', startCode: 'TA001', endCode: 'TA500', expiry: '2026-12-31', user: 'agent1@test.com' }
        ];

        let currentUser = null;
        let isAdmin = false;

        // 切換頁面
        function switchPage(pageId) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(pageId).classList.add('active');
            
            const activeBtn = Array.from(document.querySelectorAll('.nav-btn')).find(btn => btn.getAttribute('onclick').includes(pageId));
            if (activeBtn) activeBtn.classList.add('active');

            if (pageId === 'recordsPage') {
                renderRecordsTable();
            }
        }

        // 登入處理
        function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const code = document.getElementById('loginCode').value.trim();

            if (!email || !code) return;

            currentUser = email;
            
            // 判斷管理員識別碼
            if (code.toUpperCase() === 'ADMIN888') {
                isAdmin = true;
                document.getElementById('adminRegTab').style.display = 'block';
            } else {
                isAdmin = false;
                document.getElementById('adminRegTab').style.display = 'none';
            }

            document.getElementById('userInfo').innerText = `使用者: ${email} ${isAdmin ? '(管理員)' : ''}`;
            document.getElementById('loginPage').classList.remove('active');
            document.getElementById('navMenu').style.display = 'flex';
            
            switchPage('supplierPage');
            
            // 登入後立即同步 Google Sheet 的多人最新共同資料
            fetchDataFromGoogleSheet();
        }

        // 登出處理
        function logout() {
            currentUser = null;
            isAdmin = false;
            document.getElementById('userInfo').innerText = '';
            document.getElementById('navMenu').style.display = 'none';
            document.getElementById('loginForm').reset();
            switchPage('loginPage');
        }

        // 載入當前選定供應商的最新資訊
        function loadSupplierData() {
            const selectedSupplier = document.getElementById('supplierSelect').value;
            document.getElementById('infoPrefix').innerText = selectedSupplier;

            const matchedRecord = [...localRecords].find(r => r.startCode.startsWith(selectedSupplier));

            if (matchedRecord) {
                document.getElementById('infoRange').innerText = `${matchedRecord.startCode} 至 ${matchedRecord.endCode}`;
                document.getElementById('infoExpiry').innerText = matchedRecord.expiry;
            } else {
                document.getElementById('infoRange').innerText = '暫無登記範圍';
                document.getElementById('infoExpiry').innerText = '暫無資料';
            }
        }

        // 管理員登記券碼
        function handleRegister(event) {
            event.preventDefault();
            
            const prefix = document.getElementById('regPrefix').value.trim().toUpperCase();
            const startNum = document.getElementById('regStart').value.trim();
            const endNum = document.getElementById('regEnd').value.trim();
            const expiry = document.getElementById('regExpiry').value;

            const startCode = prefix + startNum;
            const endCode = prefix + endNum;
            
            const now = new Date();
            const timestamp = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;

            const newRecord = {
                timestamp: timestamp,
                startCode: startCode,
                endCode: endCode,
                expiry: expiry,
                user: currentUser
            };

            // 先加到本地列表頂端以求即時反應
            localRecords.unshift(newRecord); 

            // 同步發布到 Google 試算表後台
            uploadToGoogleSheet(newRecord);

            document.getElementById('registerForm').reset();
            alert(`登記成功並已啟動背景同步！\n首 Code: ${startCode}\n尾 Code: ${endCode}`);
            
            switchPage('recordsPage');
        }

        // 渲染歷史紀錄表格
        function renderRecordsTable() {
            const tbody = document.getElementById('recordsTableBody');
            tbody.innerHTML = '';

            localRecords.forEach(record => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${record.timestamp}</td>
                    <td>${record.startCode}</td>
                    <td>${record.endCode}</td>
                    <td>${record.expiry}</td>
                    <td>${record.user}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 將數據以 POST 方式非同步送至 Google Apps Script
        function uploadToGoogleSheet(recordData) {
            fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', 
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    action: 'insert',
                    data: recordData
                })
            })
            .then(() => {
                console.log('同步封包已成功送出');
                // 延遲重整，給予 Google 後台寫入時間後重新抓取
                setTimeout(fetchDataFromGoogleSheet, 1000);
            })
            .catch(error => console.error('網路傳輸失敗:', error));
        }

        // 自 Google Sheet 抓取多人共同更新的最新完整清單
        function fetchDataFromGoogleSheet() {
            fetch(`${GOOGLE_SCRIPT_URL}?action=read`)
            .then(response => response.json())
            .then(data => {
                if (data && data.length > 0) {
                    localRecords = data; 
                    renderRecordsTable();
                    loadSupplierData();
                }
            })
            .catch(error => {
                console.error('雲端讀取失敗，採用本地既有暫存資料顯示:', error);
                renderRecordsTable();
                loadSupplierData();
            });
        }
    </script>
</body>
</html>
