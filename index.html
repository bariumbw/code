<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Command Center - 券碼管理系統</title>
    <style>
        :root {
            --primary-color: #3498db;
            --success-color: #2ecc71;
            --admin-color: #e74c3c;
            --bg-color: #f5f7f9;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 15px;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* 登入介面 */
        #login-section {
            background: #fff;
            padding: 30px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            margin-top: 50px;
        }

        input[type="email"], input[type="password"], input[type="text"], input[type="number"], select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }

        /* 按鈕基礎樣式 */
        .btn {
            border: none;
            border-radius: 8px;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 10px;
            display: inline-block;
            text-decoration: none;
            text-align: center;
        }

        /* 登入按鈕 */
        #login-btn {
            background-color: var(--primary-color);
            color: white;
        }

        /* 執行新增按鈕美化 */
        .btn-add-stock {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            box-shadow: 0 4px 6px rgba(52, 152, 219, 0.2);
        }
        .btn-add-stock:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(52, 152, 219, 0.3);
            filter: brightness(1.1);
        }
        .btn-add-stock:active {
            transform: translateY(0);
        }

        /* 儲存禮券按鈕美化 */
        .btn-save-config {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            box-shadow: 0 4px 6px rgba(46, 204, 113, 0.2);
        }
        .btn-save-config:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(46, 204, 113, 0.3);
            filter: brightness(1.1);
        }
        .btn-save-config:active {
            transform: translateY(0);
        }

        /* 管理面板樣式 */
        .card {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            background: #eee;
        }

        .hidden { display: none !important; }

        .row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .col { flex: 1; }

        label {
            font-size: 14px;
            font-weight: 500;
            color: #666;
            margin-bottom: 5px;
            display: block;
        }

        #inventory-display {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid var(--primary-color);
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 登入部分 -->
    <section id="login-section">
        <h2 id="brand-title">Bespoke Mall 系統登入</h2>
        <input type="email" id="email" placeholder="管理員電郵" value="support@bespoke-mall.com">
        <input type="password" id="password" placeholder="密碼">
        <button id="login-btn" class="btn" onclick="checkLogin()">登入</button>
    </section>

    <!-- 管理面板 (預設隱藏) -->
    <section id="admin-panel" class="hidden">
        <div class="header">
            <h3>券碼管理與登記</h3>
            <span id="user-display" class="status-badge"></span>
        </div>

        <!-- 1. 當前庫存資訊 -->
        <div class="card">
            <label>目前庫存狀態</label>
            <div id="inventory-display">
                載入中...
            </div>
        </div>

        <!-- 2. 入庫登記表單 -->
        <div class="card">
            <h4>入庫登記</h4>
            <div class="row">
                <div class="col">
                    <label>首碼 (S/N Start)</label>
                    <input type="text" id="sn_start" placeholder="例如: AB1001">
                </div>
                <div class="col">
                    <label>尾碼 (S/N End)</label>
                    <input type="text" id="sn_end" placeholder="例如: AB1100">
                </div>
            </div>

            <div class="row">
                <div class="col">
                    <label>計算模式</label>
                    <select id="calc_type">
                        <option value="normal">純數字相減</option>
                        <option value="suffix_1">過濾尾碼 1 位</option>
                        <option value="suffix_2">過濾尾碼 2 位</option>
                    </select>
                </div>
                <div class="col">
                    <label>到期規則</label>
                    <select id="date_rule">
                        <option value="end_of_12m">12個月月底</option>
                        <option value="end_of_24m">24個月月底</option>
                        <option value="365days">365天</option>
                    </select>
                </div>
            </div>

            <button class="btn btn-add-stock" onclick="processEntry()">執行新增入庫</button>
        </div>

        <!-- 3. 配置設定 -->
        <div class="card">
            <h4>禮券項目配置</h4>
            <label>項目名稱 (如: agnès b. $50 現金券)</label>
            <input type="text" id="item_name" placeholder="輸入項目名稱">
            <button class="btn btn-save-config" onclick="saveConfig()">儲存禮券配置</button>
        </div>

        <button class="btn" onclick="logout()" style="background:#eee; color:#333; margin-top:20px;">退出系統</button>
    </section>
</div>

<script>
    // 核心設定
    const G_URL = "YOUR_GOOGLE_APPS_SCRIPT_URL"; // 請在此填入您的 GAS 連結
    const ADMIN_EMAIL = "support@bespoke-mall.com";
    const ADMIN_PW = "Admin888";

    let currentUser = null;

    // 登入檢查
    function checkLogin() {
        const email = document.getElementById('email').value;
        const pw = document.getElementById('password').value;

        if (email === ADMIN_EMAIL && pw === ADMIN_PW) {
            currentUser = email;
            showPanel();
        } else {
            alert("帳號或密碼錯誤");
        }
    }

    function showPanel() {
        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('admin-panel').classList.remove('hidden');
        document.getElementById('user-display').innerText = `管理員: ${currentUser}`;
        loadInventory();
    }

    function logout() {
        currentUser = null;
        document.getElementById('login-section').classList.remove('hidden');
        document.getElementById('admin-panel').classList.add('hidden');
        document.getElementById('password').value = "";
    }

    // 載入庫存資訊 (模擬)
    function loadInventory() {
        const display = document.getElementById('inventory-display');
        display.innerHTML = `
            <strong>項目:</strong> <span id="display_item_name">未設定</span><br>
            <strong>總量:</strong> 0<br>
            <strong>最後 SN:</strong> --- <br>
            <strong>最後有效期:</strong> ---
        `;
    }

    // 處理入庫登記邏輯
    function processEntry() {
        const start = document.getElementById('sn_start').value;
        const end = document.getElementById('sn_end').value;
        const calcType = document.getElementById('calc_type').value;
        const rule = document.getElementById('date_rule').value;

        if (!start || !end) {
            alert("請填寫首尾碼");
            return;
        }

        let qty = calculateQuantity(start, end, calcType);
        let expiryDate = calculateExpiry(rule);

        const confirmMsg = `核對入庫資料：\n數量：${qty}\n首碼：${start}\n尾碼：${end}\n預計有效期：${expiryDate}\n\n確定執行？`;
        
        if (confirm(confirmMsg)) {
            submitRecord(start, end, qty, expiryDate);
        }
    }

    function calculateQuantity(s, e, type) {
        // 提取數字邏輯
        let numS = s.replace(/[^0-9]/g, '');
        let numE = e.replace(/[^0-9]/g, '');
        
        if (type === 'suffix_1') {
            numS = numS.slice(0, -1);
            numE = numE.slice(0, -1);
        } else if (type === 'suffix_2') {
            numS = numS.slice(0, -2);
            numE = numE.slice(0, -2);
        }
        
        return parseInt(numE) - parseInt(numS) + 1;
    }

    function calculateExpiry(rule) {
        let d = new Date();
        if (rule === '365days') {
            d.setDate(d.getDate() + 365);
        } else {
            let months = rule === 'end_of_12m' ? 12 : 24;
            d.setMonth(d.getMonth() + months + 1);
            d.setDate(0); // 設定為該月最後一天
        }
        return d.toISOString().split('T')[0];
    }

    function submitRecord(s, e, q, d) {
        console.log("提交中...", { s, e, q, d });
        alert("新增成功 (測試模式)");
    }

    function saveConfig() {
        const name = document.getElementById('item_name').value;
        if(!name) { alert("請輸入項目名稱"); return; }
        document.getElementById('display_item_name').innerText = name;
        alert("禮券配置已更新");
    }

</script>

</body>
</html>
