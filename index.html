<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>券碼管理與登記系統</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #f5f5f7;
            color: #333333;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            padding: 24px;
        }

        header {
            border-bottom: 1px solid #e5e5e7;
            padding-bottom: 16px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 24px;
            color: #1d1d1f;
        }

        h2 {
            font-size: 20px;
            color: #1d1d1f;
            margin-bottom: 16px;
            margin-top: 12px;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
        }

        input[type="text"],
        input[type="email"],
        input[type="date"],
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #d2d2d7;
            border-radius: 8px;
            font-size: 16px;
            background-color: #ffffff;
            outline: none;
        }

        input:focus, select:focus {
            border-color: #0071e3;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #0071e3;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #005bb5;
        }

        button.secondary {
            background-color: #f5f5f7;
            color: #0071e3;
            border: 1px solid #0071e3;
            margin-top: 12px;
        }

        button.secondary:hover {
            background-color: #e8e8ed;
        }

        .nav-menu {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .nav-btn {
            background-color: #f5f5f7;
            color: #1d1d1f;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            border: none;
            width: auto;
        }

        .nav-btn.active {
            background-color: #1d1d1f;
            color: #ffffff;
        }

        .info-card {
            background-color: #f5f5f7;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
            border-left: 4px solid #0071e3;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .info-row:last-child {
            margin-bottom: 0;
        }

        .table-responsive {
            width: 100%;
            overflow-x: auto;
            margin-top: 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 14px;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #e5e5e7;
        }

        th {
            background-color: #f5f5f7;
            font-weight: 600;
        }

        .user-info {
            font-size: 14px;
            color: #666666;
            text-align: right;
        }

        .admin-section {
            background-color: #fafafa;
            border: 1px dashed #d2d2d7;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 24px;
        }

        @media (max-width: 600px) {
            .grid-2 {
                grid-template-columns: 1fr;
                gap: 0;
            }
            .nav-menu {
                flex-wrap: wrap;
            }
            .nav-btn {
                flex: 1 1 40%;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>券碼管理系統</h1>
            <div id="userInfo" class="user-info"></div>
        </header>

        <!-- 導覽選單 -->
        <div id="navMenu" class="nav-menu" style="display: none;">
            <button class="nav-btn active" onclick="switchPage('supplierPage')">供應商專區</button>
            <button class="nav-btn" id="adminRegTab" onclick="switchPage('registerPage')" style="display: none;">登記券 Code</button>
            <button class="nav-btn" onclick="switchPage('recordsPage')">所有登記紀錄</button>
            <button class="nav-btn secondary" onclick="logout()" style="margin-top: 0; padding: 8px 16px;">登出</button>
        </div>

        <!-- 1) 統一登入頁 -->
        <div id="loginPage" class="page active">
            <h2>系統登入</h2>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="loginEmail">電子郵件 (Email)</label>
                    <input type="email" id="loginEmail" required placeholder="example@domain.com">
                </div>
                <div class="form-group">
                    <label for="loginCode">識別碼</label>
                    <input type="text" id="loginCode" required placeholder="請輸入識別代碼">
                </div>
                <button type="submit">登入</button>
            </form>
        </div>

        <!-- 2) 供應商頁 (新增與查詢) -->
        <div id="supplierPage" class="page">
            <!-- 管理員專屬：新增供應商與禮券（在此時綁定到期日模式） -->
            <div id="adminAddSection" class="admin-section" style="display: none;">
                <h2>新增供應商與禮券 (管理員限權)</h2>
                <div class="grid-2">
                    <div class="form-group">
                        <label for="newSupplierName">1. 新增供應商名稱</label>
                        <input type="text" id="newSupplierName" placeholder="例如: 供應商A">
                        <button type="button" class="secondary" onclick="addSupplier()" style="margin-top: 8px;">確認新增供應商</button>
                    </div>
                    <div class="form-group">
                        <label for="belongSupplier">2. 選擇隸屬供應商</label>
                        <select id="belongSupplier"></select>
                        
                        <label for="newGiftName" style="margin-top: 8px;">禮券名稱</label>
                        <input type="text" id="newGiftName" placeholder="例如: A $50">
                        
                        <label for="newGiftRule" style="margin-top: 8px;">預設計算到期日模式</label>
                        <select id="newGiftRule">
                            <option value="12m_end">12個月月底</option>
                            <option value="13m_end">13個月月底</option>
                            <option value="15m_end">15個月月底</option>
                            <option value="18m_end">18個月月底</option>
                            <option value="24m_end">24個月月底</option>
                            <option value="365d">365日</option>
                        </select>
                        <button type="button" class="secondary" onclick="addGift()" style="margin-top: 12px;">確認新增禮券(繫結規則)</button>
                    </div>
                </div>
            </div>

            <h2>供應商券碼查詢</h2>
            <div class="grid-2">
                <div class="form-group">
                    <label for="supplierSelect">選擇供應商</label>
                    <select id="supplierSelect" onchange="updateGiftSelect('supplierSelect', 'giftSelect')"></select>
                </div>
                <div class="form-group">
                    <label for="giftSelect">選擇禮券項目</label>
                    <select id="giftSelect" onchange="loadQueryData()"></select>
                </div>
            </div>

            <div class="info-card">
                <h3>當前最新券碼狀態</h3>
                <div class="info-row" style="margin-top: 12px;">
                    <span>指定禮券項目:</span>
                    <strong id="infoGiftName">-</strong>
                </div>
                <div class="info-row">
                    <span>最後登記範圍:</span>
                    <strong id="infoRange">-</strong>
                </div>
                <div class="info-row">
                    <span>到期日:</span>
                    <strong id="infoExpiry">-</strong>
                </div>
                <div class="info-row">
                    <span>最新登記時間:</span>
                    <strong id="infoTime">-</strong>
                </div>
            </div>
        </div>

        <!-- 3) 登記code 頁 (自動讀取禮券到期日規則，無須重複選擇) -->
        <div id="registerPage" class="page">
            <h2>登記新券碼 (管理員權限)</h2>
            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="grid-2">
                    <div class="form-group">
                        <label for="regSupplierSelect">選擇供應商</label>
                        <select id="regSupplierSelect" required onchange="updateGiftSelect('regSupplierSelect', 'regGiftSelect')"></select>
                    </div>
                    <div class="form-group">
                        <label for="regGiftSelect">選擇禮券項目</label>
                        <select id="regGiftSelect" required onchange="showActiveRule()"></select>
                    </div>
                </div>

                <div class="form-group" style="background-color: #f5f5f7; padding: 12px; border-radius: 8px;">
                    <span style="font-size: 14px; color: #1d1d1f; font-weight: 500;">此禮券預設到期規則: </span>
                    <strong id="activeRuleText" style="color: #0071e3; font-size: 14px;">-</strong>
                </div>
                
                <div class="grid-2">
                    <div class="form-group">
                        <label for="regStart">首 Code (例如: TA001)</label>
                        <input type="text" id="regStart" required placeholder="例如: TA001" oninput="this.value = this.value.toUpperCase()">
                    </div>
                    <div class="form-group">
                        <label for="regEnd">尾 Code (例如: TA500)</label>
                        <input type="text" id="regEnd" required placeholder="例如: TA500" oninput="this.value = this.value.toUpperCase()">
                    </div>
                </div>

                <button type="submit">確認登記並上傳同步</button>
            </form>
        </div>

        <!-- 4) 記錄所有的登記code頁 -->
        <div id="recordsPage" class="page">
            <h2>所有登記歷史紀錄</h2>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>登記時間</th>
                            <th>供應商</th>
                            <th>禮券名稱</th>
                            <th>首 Code</th>
                            <th>尾 Code</th>
                            <th>到期日</th>
                            <th>登記人</th>
                        </tr>
                    </thead>
                    <tbody id="recordsTableBody">
                        <!-- 資料由 JavaScript 動態填入 -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        // 成功更新為您指定的最新 Google Apps Script Web App 網址
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxFFE-1FzKiRDRiO4K_JV2J5azrYFWd4GWdTgJ_vZhXWnLiiGepF7mxoyU0lHDHguQU/exec';

        // 初始本地備用配置結構
        let suppliersData = {
            "供應商a": [
                { name: "A $50", rule: "12m_end" },
                { name: "A $80", rule: "12m_end" },
                { name: "A $100", rule: "12m_end" }
            ],
            "供應商B": [
                { name: "B $50", rule: "13m_end" },
                { name: "B $80", rule: "13m_end" },
                { name: "B $100", rule: "13m_end" }
            ]
        };
        let localRecords = [];

        let currentUser = null;
        let isAdmin = false;

        const ruleMapping = {
            "12m_end": "12個月月底",
            "13m_end": "13個月月底",
            "15m_end": "15個月月底",
            "18m_end": "18個月月底",
            "24m_end": "24個月月底",
            "365d": "365日"
        };

        // 計算到期日的核心邏輯
        function calculateExpiryDate(startDate, rule) {
            let year = startDate.getFullYear();
            let month = startDate.getMonth(); 

            if (rule === '365d') {
                let resultDate = new Date(startDate.getTime());
                resultDate.setDate(resultDate.getDate() + 365);
                return resultDate.toISOString().split('T')[0];
            }

            let monthsToAdd = 12;
            if (rule === '13m_end') monthsToAdd = 13;
            if (rule === '15m_end') monthsToAdd = 15;
            if (rule === '18m_end') monthsToAdd = 18;
            if (rule === '24m_end') monthsToAdd = 24;

            let targetDate = new Date(year, month + monthsToAdd + 1, 0);
            return targetDate.toISOString().split('T')[0];
        }

        // 格式化輸出目前系統時間
        function getFormattedTimestamp() {
            const now = new Date();
            return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
        }

        // 初始化所有下拉式選單元素
        function initDropdowns() {
            populateSelectWithOptions('supplierSelect', Object.keys(suppliersData));
            populateSelectWithOptions('belongSupplier', Object.keys(suppliersData));
            populateSelectWithOptions('regSupplierSelect', Object.keys(suppliersData));

            updateGiftSelect('supplierSelect', 'giftSelect');
            updateGiftSelect('regSupplierSelect', 'regGiftSelect');
        }

        function populateSelectWithOptions(selectId, optionsArray) {
            const selectEl = document.getElementById(selectId);
            selectEl.innerHTML = '';
            optionsArray.forEach(opt => {
                const el = document.createElement('option');
                el.value = opt;
                el.innerText = opt;
                selectEl.appendChild(el);
            });
        }

        // 更新禮券選單
        function updateGiftSelect(supplierSelectId, giftSelectId) {
            const supplierVal = document.getElementById(supplierSelectId).value;
            const gifts = suppliersData[supplierVal] || [];
            
            const selectEl = document.getElementById(giftSelectId);
            selectEl.innerHTML = '';
            
            gifts.forEach(giftObj => {
                const el = document.createElement('option');
                el.value = giftObj.name;
                el.innerText = `${giftObj.name} (${ruleMapping[giftObj.rule] || '未指定'})`;
                selectEl.appendChild(el);
            });
            
            if(supplierSelectId === 'supplierSelect') {
                loadQueryData();
            } else if(supplierSelectId === 'regSupplierSelect') {
                showActiveRule();
            }
        }

        // 在登記頁面上動態顯示當前被選中禮券的到期規則
        function showActiveRule() {
            const supplier = document.getElementById('regSupplierSelect').value;
            const giftName = document.getElementById('regGiftSelect').value;
            const gifts = suppliersData[supplier] || [];
            const found = gifts.find(g => g.name === giftName);
            
            if (found) {
                document.getElementById('activeRuleText').innerText = ruleMapping[found.rule] || '未指定';
            } else {
                document.getElementById('activeRuleText').innerText = '無預設規則';
            }
        }

        // 切換系統分頁
        function switchPage(pageId) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(pageId).classList.add('active');
            
            const activeBtn = Array.from(document.querySelectorAll('.nav-btn')).find(btn => btn.getAttribute('onclick').includes(pageId));
            if (activeBtn) activeBtn.classList.add('active');

            if (pageId === 'recordsPage') {
                renderRecordsTable();
            }
            if (pageId === 'registerPage') {
                showActiveRule();
            }
        }

        // 統一入口登入判斷
        function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('loginEmail').value.trim().toLowerCase();
            const code = document.getElementById('loginCode').value.trim();

            if (!email || !code) return;

            currentUser = email;
            
            if (email === 'support@bespoke-mall.com') {
                isAdmin = true;
                document.getElementById('adminRegTab').style.display = 'block';
                document.getElementById('adminAddSection').style.display = 'block';
            } else {
                isAdmin = false;
                document.getElementById('adminRegTab').style.display = 'none';
                document.getElementById('adminAddSection').style.display = 'none';
            }

            document.getElementById('userInfo').innerText = `使用者: ${email} ${isAdmin ? '(管理員)' : ''}`;
            document.getElementById('loginPage').classList.remove('active');
            document.getElementById('navMenu').style.display = 'flex';
            
            initDropdowns();
            switchPage('supplierPage');
            
            fetchDataFromGoogleSheet();
        }

        // 登出表單重設
        function logout() {
            currentUser = null;
            isAdmin = false;
            document.getElementById('userInfo').innerText = '';
            document.getElementById('navMenu').style.display = 'none';
            document.getElementById('loginForm').reset();
            switchPage('loginPage');
        }

        // 新增供應商名冊
        function addSupplier() {
            const name = document.getElementById('newSupplierName').value.trim();
            if (!name) return;
            if (!suppliersData[name]) {
                suppliersData[name] = [];
                uploadConfigToGoogleSheet();
                initDropdowns();
                document.getElementById('newSupplierName').value = '';
                alert(`供應商 [${name}] 新增成功！`);
            } else {
                alert('此供應商已被建立。');
            }
        }

        // 新增禮券（繫結到期日計算規則）
        function addGift() {
            const supplier = document.getElementById('belongSupplier').value;
            const giftName = document.getElementById('newGiftName').value.trim();
            const rule = document.getElementById('newGiftRule').value;
            if (!supplier || !giftName) return;
            
            const gifts = suppliersData[supplier] || [];
            const exists = gifts.some(g => g.name === giftName);
            
            if (!exists) {
                suppliersData[supplier].push({ name: giftName, rule: rule });
                uploadConfigToGoogleSheet();
                initDropdowns();
                document.getElementById('newGiftName').value = '';
                alert(`成功為 ${supplier} 新增禮券 [${giftName}] 且已繫結 [${ruleMapping[rule]}] 規則！`);
            } else {
                alert('該供應商之下已存在相同名稱之禮券。');
            }
        }

        // 動態檢視並渲染當前最新狀態面板
        function loadQueryData() {
            const supplier = document.getElementById('supplierSelect').value;
            const gift = document.getElementById('giftSelect').value;
            
            document.getElementById('infoGiftName').innerText = gift ? `${supplier} - ${gift}` : '-';

            const matchedRecord = localRecords.find(r => r.supplier === supplier && r.giftName === gift);

            if (matchedRecord) {
                document.getElementById('infoRange').innerText = `${matchedRecord.startCode} 至 ${matchedRecord.endCode}`;
                document.getElementById('infoExpiry').innerText = matchedRecord.expiry;
                document.getElementById('infoTime').innerText = matchedRecord.timestamp;
            } else {
                document.getElementById('infoRange').innerText = '暫無登記範圍';
                document.getElementById('infoExpiry').innerText = '暫無資料';
                document.getElementById('infoTime').innerText = '-';
            }
        }

        // 管理員提交券碼登記 (自動讀取該禮券設定的規則在背景計算)
        function handleRegister(event) {
            event.preventDefault();
            
            const supplier = document.getElementById('regSupplierSelect').value;
            const giftName = document.getElementById('regGiftSelect').value;
            const startCode = document.getElementById('regStart').value.trim();
            const endCode = document.getElementById('regEnd').value.trim();

            const gifts = suppliersData[supplier] || [];
            const foundGift = gifts.find(g => g.name === giftName);
            const rule = foundGift ? foundGift.rule : '12m_end'; 

            const now = new Date();
            const expiryDateStr = calculateExpiryDate(now, rule);
            const timestampStr = getFormattedTimestamp();

            const newRecord = {
                timestamp: timestampStr,
                supplier: supplier,
                giftName: giftName,
                startCode: startCode,
                endCode: endCode,
                expiry: expiryDateStr,
                user: currentUser
            };

            localRecords.unshift(newRecord); 
            uploadRecordToGoogleSheet(newRecord);

            document.getElementById('registerForm').reset();
            updateGiftSelect('regSupplierSelect', 'regGiftSelect');
            
            alert(`登記完畢！\n系統已自動抓取該禮券的 [${ruleMapping[rule]}] 規則計算到期日為: ${expiryDateStr}`);
            switchPage('recordsPage');
        }

        // 渲染整體歷史明細數據表格
        function renderRecordsTable() {
            const tbody = document.getElementById('recordsTableBody');
            tbody.innerHTML = '';

            if (localRecords.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; color: #666666;">暫無數據，正在自後端下載同步或尚無任何登記明細...</td></tr>';
                return;
            }

            localRecords.forEach(record => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${record.timestamp}</td>
                    <td>${record.supplier}</td>
                    <td>${record.giftName}</td>
                    <td>${record.startCode}</td>
                    <td>${record.endCode}</td>
                    <td>${record.expiry}</td>
                    <td>${record.user}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // ================= Google Sheets 傳輸對接控制區塊 =================

        function uploadRecordToGoogleSheet(recordData) {
            fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'insertRecord', data: recordData })
            }).then(() => {
                setTimeout(fetchDataFromGoogleSheet, 1200);
            });
        }

        function uploadConfigToGoogleSheet() {
            fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'saveConfig', data: suppliersData })
            });
        }

        function fetchDataFromGoogleSheet() {
            fetch(`${GOOGLE_SCRIPT_URL}?action=readAll`)
            .then(response => response.json())
            .then(res => {
                if(res.config && Object.keys(res.config).length > 0) {
                    suppliersData = res.config;
                    initDropdowns();
                }
                if(res.records) {
                    localRecords = res.records;
                    renderRecordsTable();
                    loadQueryData();
                }
            })
            .catch(err => {
                console.log("網路限制，採用本地預存數據渲染");
                renderRecordsTable();
                loadQueryData();
            });
        }
    </script>
</body>
</html>
